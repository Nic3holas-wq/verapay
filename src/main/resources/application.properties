spring.application.name=verapay
logging.pattern.console=${CONSOLE_LOG_PATTERN:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %cyan(%msg%n)}
#logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.eazybytes.jobportal=${LOG_LEVEL:INFO}

logging.file.name=logs/verapay.log
logging.pattern.file={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c","message":"%m"}


# URL for PostgreSQL
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}

# Standard credentials
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Hibernate/JPA settings for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# debug settings
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.default_batch_fetch_size=${DEFAULT_BATCH_FETCH_SIZE:50}

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=2000ms

spring.docker.compose.lifecycle-management=start-and-stop
spring.docker.compose.start.command=up
spring.docker.compose.stop.command=stop


# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,https://dev.verapay.nicko.com
app.cors.allowed-methods=*
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

management.endpoint.health.show-details=always
management.server.port=9090
management.server.address=127.0.0.1
management.endpoints.web.base-path=/verapay/actuator
management.endpoints.web.exposure.include=health,info
management.endpoints.web.exposure.exclude=shutdown,env,beans,mappings,heapdump,threaddump,configprops
management.endpoint.configprops.show-values=always
management.endpoint.env.show-values=always

management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Backend Project for VeraPay Wallet API
info.app.version=1.0.0
info.app.contact.email=support@verapay.com
info.developer.name=Nicholas

management.endpoint.shutdown.access=unrestricted

management.otlp.metrics.export.url=http://localhost:4318/v1/metrics
management.otlp.metrics.export.step=10s

management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
management.tracing.sampling.probability=1.0

management.opentelemetry.logging.export.otlp.endpoint=http://localhost:4318/v1/logs

# payment integration credentials
mpesa.consumer.key=${MPESA_CONSUMER_KEY}
mpesa.consumer.secret=${MPESA_CONSUMER_SECRET}
mpesa.business.shortcode=${MPESA_BUSINESS_SHORTCODE}
mpesa.passkey=${MPESA_PASSKEY}
mpesa.initiator.name=${MPESA_INITIATOR_NAME}
mpesa.security.credential=${MPESA_SECURITY_CREDENTIAL}
mpesa.b2c.shortcode=${MPESA_B2C_SHORTCODE}
mpesa.base.url=${MPESA_BASE_URL}
mpesa.callback.base.url=${MPESA_CALLBACK_BASE_URL}

# email
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Sender name
spring.mail.properties.mail.smtp.from=${MAIL_SMTP_FROM}

mpesa.allowed.ips=${MPESA_ALLOWED_IPS}
mpesa.webhook.token=${MPESA_WEBHOOK_TOKEN}
